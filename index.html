<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poker AI Pro</title>

<style>
body{
font-family:Arial;
background:#062f25;
color:white;
text-align:center;
padding:20px;
}

.card{
background:#0c4d3a;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input{
padding:10px;
margin:8px;
width:220px;
border-radius:6px;
border:none;
}

button{
padding:12px 25px;
background:#ffd000;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>♠ Poker AI Pro</h1>

<div class="card">

<div>
<label>Your Cards</label><br>
<input id="hand" placeholder="Ah Kh">
</div>

<div>
<label>Flop</label><br>
<input id="flop" placeholder="Qs Jh 2d">
</div>

<div>
<label>Turn</label><br>
<input id="turn" placeholder="9c">
</div>

<div>
<label>River</label><br>
<input id="river" placeholder="optional">
</div>

<div>
<label>Number of Opponents</label><br>
<input id="players" type="number" value="1">
</div>

<button onclick="simulate()">Calculate Winning Chance</button>

<div class="result" id="equity"></div>
<div class="result" id="advice"></div>

</div>

<script>

const ranks = "23456789TJQKA".split("");
const suits = "shdc".split("");

function buildDeck(){
let deck=[]
for(let r of ranks){
for(let s of suits){
deck.push(r+s)
}
}
return deck
}

function removeCard(deck,card){
let i=deck.indexOf(card)
if(i>-1) deck.splice(i,1)
}

function randomCard(deck){
let i=Math.floor(Math.random()*deck.length)
return deck.splice(i,1)[0]
}

function simulate(){

let hand=document.getElementById("hand").value.split(" ")
let flop=document.getElementById("flop").value.split(" ")
let turn=document.getElementById("turn").value? [document.getElementById("turn").value]:[]
let river=document.getElementById("river").value? [document.getElementById("river").value]:[]
let opponents=parseInt(document.getElementById("players").value)

let board=[...flop,...turn,...river]

let trials=10000
let wins=0

for(let t=0;t<trials;t++){

let deck=buildDeck()

for(let c of [...hand,...board]){
removeCard(deck,c)
}

let boardSim=[...board]

while(boardSim.length<5){
boardSim.push(randomCard(deck))
}

let heroScore=Math.random()

let lose=false

for(let o=0;o<opponents;o++){

let opp=[randomCard(deck),randomCard(deck)]

let oppScore=Math.random()

if(oppScore>heroScore){
lose=true
break
}

}

if(!lose) wins++

}

let equity=(wins/trials*100).toFixed(1)

document.getElementById("equity").innerHTML=
"Win Probability: "+equity+"%"

let move="FOLD"

if(equity>65) move="RAISE"
else if(equity>40) move="CALL"
else move="FOLD"

document.getElementById("advice").innerHTML=
"Recommended Move: "+move

}

</script>

</body>
</html>
